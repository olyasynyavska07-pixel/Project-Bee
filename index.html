<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div style="display: flex; align-items: center;">
            <button class="bee-btn-left">🐝</button>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search goods...">
            </div>
        </div>

        <div class="logo-container">
            <span style="font-size:45px">🐝</span>
            <div class="logo-text">
                <h1>Golden Apiary</h1>
                <p>The best honey and bees straight from the beekeeper</p>
            </div>
        </div>

        <button class="catalog-btn">Catalog of goods</button>
    </header>

    <div class="main-container">
        <nav class="sidebar">
            <a href="#" class="nav-button"><i class="fas fa-home"></i></a>
            <a href="#" class="nav-button"><i class="fas fa-seedling"></i></a>
            <a href="#" class="nav-button"><i class="fas fa-jar"></i></a>
        </nav>
        <div style="padding: 20px;">
            <h1>Вітаємо!</h1>
        </div>
    </div>
</body>
</html>
