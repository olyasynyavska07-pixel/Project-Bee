<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="sidebar">
        <div class="side-btn">🏠</div>
        <div class="side-btn">🍯</div>
        <div class="side-btn">🐝</div>
        <div class="side-btn"></div>
        <div class="side-btn"></div>
        <div class="side-btn"></div>
        <div class="side-btn"></div>
    </div>

    <div class="wrapper">
        <header class="apiary-header">
            <div class="section left">
                <div class="mini-bee">🐝</div>
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" placeholder="Search goods...">
                </div>
            </div>

            <div class="section center">
                <div class="brand-box">
                    <div class="brand-main">
                        <span class="bee-big">🐝</span>
                        <h1>Golden Apiary</h1>
                    </div>
                    <p class="subtitle">The best honey and bees straight from the beekeeper</p>
                </div>
            </div>

            <div class="section right">
                <button class="catalog-btn">Catalog of goods</button>
            </div>
        </header>
    </div>

</body>
</html>
