<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary - Catalog</title>
    <style>
        /* Копіюємо основні стилі з index.html */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { display: flex; font-family: 'Arial', sans-serif; background-color: #f7f7f7; height: 100vh; overflow: hidden; }

        .sidebar { width: 70px; height: 100%; background-color: #6d744e; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        .side-btn { width: 50px; height: 50px; background-color: #d9db72; margin-bottom: 15px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; text-decoration: none; }

        .main-container { flex: 1; display: flex; flex-direction: column; position: relative; }
        .header { background-color: #fef08a; height: 130px; display: flex; align-items: center; justify-content: center; border-bottom: 8px solid #fde047; }
        
        .logo-box { background-color: #fef987; border: 5px solid #facc15; border-radius: 15px; padding: 10px 30px; text-align: center; }
        .logo-box h1 { font-size: 36px; font-style: italic; color: #374151; }

        /* Контент каталогу */
        .content { padding: 40px; text-align: center; }
        .catalog-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .item { background: white; border: 2px solid #ddd; padding: 20px; border-radius: 15px; }

        .footer-line { position: absolute; bottom: 0; left: 0; width: 100%; height: 12px; background-color: #fde047; }
    </style>
</head>
<body>

    <div class="sidebar">
        <a href="index.html" class="side-btn">🏠</a>
        <div class="side-btn">🍯</div>
    </div>

    <div class="main-container">
        <header class="header">
            <div class="logo-box">
                <h1>Каталог товарів</h1>
            </div>
        </header>

        <main class="content">
            <h2>Наші медові новинки</h2>
            <div class="catalog-list">
                <div class="item">🍯 Акацієвий мед</div>
                <div class="item">🍯 Гречаний мед</div>
                <div class="item">🍯 Липовий мед</div>
                <div class="item">🐝 Бджолиний віск</div>
            </div>
        </main>

        <div class="footer-line"></div>
    </div>

</body>
</html>
