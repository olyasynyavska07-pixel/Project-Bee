<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Apiary — Каталог</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-header">
        <div class="header-left">
            <div class="logo-box">
                <i class="fas fa-bee logo-icon"></i>
            </div>
            <div class="search-bar">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search goods...">
            </div>
        </div>
        
        <div class="header-center">
            <div class="title-group">
                <i class="fas fa-bee header-bee"></i>
                <h1 class="main-title">Golden Apiary</h1>
            </div>
            <p class="main-subtitle">The best honey and bees straight from the beekeeper</p>
        </div>

        <div class="header-right">
            <a href="#" class="catalog-button">Catalog of goods</a>
        </div>
    </header>

    <aside class="side-navigation">
        <div class="nav-item home-item active">
            <i class="fas fa-home home-icon"></i>
        </div>
        
        <div class="nav-item empty-item"></div>
        <div class="nav-item empty-item"></div>
        <div class="nav-item empty-item"></div>
        <div class="nav-item empty-item"></div>
        <div class="nav-item empty-item"></div>
        <div class="nav-item empty-item"></div>
        <div class="nav-item empty-item"></div>
    </aside>

    <main class="main-content">
        <div class="container">
            <div class="placeholder-text">
                Welcome to Golden Apiary! Your natural honey factory.
            </div>
        </div>
    </main>

</body>
</html>
