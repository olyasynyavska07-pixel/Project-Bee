<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Золота Пасіка — Слайдер</title>
    
    <style>
        /* --- ПРЕЛОАДЕР --- */
        #loader {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #ffcc00;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.8s ease;
        }
        .bee-fly { font-size: 60px; animation: bounce 0.8s infinite alternate ease-in-out; }
        @keyframes bounce { from { transform: translateY(0px); } to { transform: translateY(-25px); } }
        #loader.hidden { opacity: 0; visibility: hidden; }

        /* --- СЛАЙДЕР НА ФОНІ --- */
        .background-slider {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* Фон під текстом */
            overflow: hidden;
        }

        .slide {
            position: absolute;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            animation: slideAnimation 18s infinite; /* 18 секунд на все коло */
        }

        /* Додаємо 3 картинки (можна замінити посилання на свої) */
        .slide:nth-child(1) { 
            background-image: url('https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRmi9J0sEd3L1FDd4a60Y7oBEh5LT129UKOPw&s'); 
            animation-delay: 0s; 
        }
        .slide:nth-child(2) { 
            background-image: url('https://pixnio.com/free-images/2025/10/24/2025-10-24-06-42-53-1344x756.jpg'); 
            animation-delay: 6s; 
        }
        .slide:nth-child(3) { 
            background-image: url('https://st3.depositphotos.com/1046535/13924/i/450/depositphotos_139245078-stock-photo-meadow-with-flowers-in-summer.jpg'); 
            animation-delay: 12s; 
        }

        @keyframes slideAnimation {
            0% { opacity: 0; }
            10% { opacity: 0.4; } /* Затемнюємо, щоб текст було видно */
            33% { opacity: 0.4; }
            43% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* Шар для затемнення, щоб текст краще читали */
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 253, 245, 0.7); /* Напівпрозорий білий шар */
            z-index: -1;
        }

        /* --- СТИЛІ САЙТУ --- */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            color: #332200; 
        }

        header { 
            padding: 100px 20px; 
            text-align: center; 
        }

        h1 { font-size: 4em; margin: 0; color: #4d3300; }

        .container { 
            max-width: 1100px; 
            margin: 0 auto 50px; 
            padding: 20px; 
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .product-card { 
            background: rgba(255, 255, 255, 0.9); /* Прозорість картинок */
            backdrop-filter: blur(5px); /* Ефект розмиття фону */
            border-radius: 25px; 
            padding: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #ffcc00;
            transition: 0.3s;
        }

        .product-card:hover { transform: scale(1.03); }

        .btn { 
            display: block; 
            background: #ffcc00; 
            color: #000; 
            padding: 15px; 
            text-align: center;
            text-decoration: none; 
            border-radius: 50px; 
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="bee-fly">🐝</div>
        <div style="font-weight: bold; margin-top: 20px;">Готуємо мед...</div>
    </div>

    <div class="background-slider">
        <div class="slide"></div>
        <div class="slide"></div>
        <div class="slide"></div>
    </div>
    <div class="overlay"></div>

    <header>
        <h1>🐝 Золота Пасіка</h1>
        <p style="font-size: 1.5em;">Якість, перевірена бджолами</p>
    </header>

    <div class="container">
        <div class="products-grid">
            <div class="product-card">
                <h2>🍯 Мед Акації</h2>
                <p>Прозорий, ніжний і довго не кристалізується. Найкращий вибір для дітей.</p>
                <p><strong>Ціна: 300 грн / л</strong></p>
                <a href="#" class="btn">Замовити</a>
            </div>
            <div class="product-card">
                <h2>📦 Бджолопакети</h2>
                <p>Порода Карпатка. 4 рамки (3 розплід + 1 кормова). Здорові матки.</p>
                <p><strong>Ціна: від 1600 грн</strong></p>
                <a href="#" class="btn">Дізнатись деталі</a>
            </div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 800);
        });
    </script>
</body>
</html>
