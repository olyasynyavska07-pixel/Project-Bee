<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="main-layout">
        <div class="right-section">
            <header class="header">
                <div class="side-btn" style="margin:0">🐝</div>
                <div class="logo-box"><h1>Golden Apiary</h1></div>
                <button class="head-btn" onclick="location.href='index.html'">Back</button>
            </header>
            <div class="auth-wrapper">
                <div class="auth-card">
                    <div class="auth-inner">
                        <h2 style="color: #a3a63c; margin-bottom: 15px;">Please register</h2>
                        <div class="input-box"><span>👤</span><input type="text" placeholder="Login"></div>
                        <div class="input-box"><span>📧</span><input type="email" placeholder="Email"></div>
                        <div class="input-box"><span>🔑</span><input type="password" placeholder="Password"></div>
                        <div class="input-box"><span>🔐</span><input type="password" placeholder="repeat Password"></div>
                        <button class="head-btn" style="width:100%; margin-top:10px;">Sing</button>
                        <div style="height:4px; background:#d1d5db; margin: 15px -25px;"></div>
                        <button class="head-btn" style="width:100%;" onclick="location.href='login.html'">Login</button>
                    </div>
                </div>
            </div>
            <div class="footer-line"></div>
        </div>
    </div>
</body>
</html>
