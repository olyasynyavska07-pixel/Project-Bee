<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Apiary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>

    <header class="top-bar">
        <div class="header-left">
            <div class="logo-box">
                <span class="bee-emoji">🐝</span>
            </div>
            <div class="search-field">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search goods...">
            </div>
        </div>
        
        <div class="header-center">
            <div class="title-group">
                <span class="bee-emoji-big">🐝</span>
                <h1>Golden Apiary</h1>
            </div>
            <p>The best honey and bees straight from the beekeeper</p>
        </div>

        <div class="header-right">
            <button class="catalog-btn">Catalog of goods</button>
        </div>
    </header>

    <aside class="sidebar">
        <div class="nav-item active">
            <i class="fas fa-home"></i>
        </div>
        <div class="nav-item empty"></div>
        <div class="nav-item empty"></div>
        <div class="nav-item empty"></div>
        <div class="nav-item empty"></div>
        <div class="nav-item empty"></div>
        <div class="nav-item empty"></div>
    </aside>

    <main class="content">
        </main>

</body>
</html>
