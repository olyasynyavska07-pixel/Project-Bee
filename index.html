<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary - Catalog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="sidebar">
        <div class="side-btn" id="btn-home">🏠</div>
        <div class="side-btn">🍯</div>
        <div class="side-btn">🐝</div>
        <div class="side-btn">🛒</div>
    </nav>

    <div class="main-container">
        <header class="header">
            <div class="search-area">
                <span style="font-size: 24px;">🐝🥄</span>
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" placeholder="Пошук у каталозі...">
                </div>
            </div>

            <div class="logo-box">
                <h1>Наш Каталог</h1>
                <p>Оберіть найкращий мед для себе</p>
            </div>

            <div class="btn-group">
                <button class="head-btn">Профіль</button>
                <button class="head-btn" id="btn-back">На головну</button>
            </div>
        </header>

        <main class="content">
            <div class="card" style="display:flex; align-items:center; justify-content:center;">🍯 Мед Акації</div>
            <div class="card" style="display:flex; align-items:center; justify-content:center;">🍯 Гречаний</div>
            <div class="card" style="display:flex; align-items:center; justify-content:center;">🐝 Пилок</div>
            <div class="card" style="display:flex; align-items:center; justify-content:center;">🍯 Липовий</div>
            <div class="card" style="display:flex; align-items:center; justify-content:center;">🐝 Прополіс</div>
            <div class="card" style="display:flex; align-items:center; justify-content:center;">🍯 Квітковий</div>
        </main>

        <div class="footer-line"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
