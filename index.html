<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary</title>
    <style>
        /* Весь дизайн тепер тут, щоб він точно завантажився */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            font-family: 'Arial', sans-serif;
            background-color: #fff;
        }

        /* Ліве оливкове меню */
        .sidebar {
            width: 70px;
            height: 100vh;
            background-color: #6d744e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            position: fixed;
            left: 0;
            top: 0;
        }

        .side-btn {
            width: 50px;
            height: 50px;
            background-color: #d9db72;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
        }

        /* Основна частина сайту */
        .main-container {
            margin-left: 70px;
            width: calc(100% - 70px);
        }

        /* ШАПКА */
        .header {
            background-color: #fff27e;
            height: 120px;
            display: flex;
            align-items: center;
            padding: 0 30px;
            position: relative;
        }

        /* Ліва частина: Бджілка + Пошук */
        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 2;
        }

        .mini-bee {
            background-color: #d9db72;
            padding: 8px;
            border-radius: 8px;
            font-size: 22px;
        }

        .search-box {
            background-color: #e5e5e5;
            border-radius: 20px;
            display: flex;
            align-items: center;
            padding: 8px 15px;
            width: 220px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            margin-left: 10px;
        }

        /* Центр: Логотип у рамці */
        .header-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 1;
        }

        .brand-box {
            background-color: #fef987;
            border: 7px solid #facc15;
            border-radius: 15px;
            padding: 10px 30px;
            min-width: 300px;
        }

        .brand-box h1 {
            margin: 0;
            font-size: 36px;
            font-style: italic;
            color: #444;
        }

        .subtitle {
            margin: 0;
            font-size: 12px;
            font-style: italic;
            font-weight: bold;
            color: #333;
        }

        /* Права частина: Каталог */
        .header-right {
            margin-left: auto;
            z-index: 2;
        }

        .catalog-btn {
            background-color: #d9db72;
            border: 2px solid #444;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="side-btn">🏠</div>
        <div class="side-btn">🍯</div>
        <div class="side-btn">🐝</div>
        <div class="side-btn">📦</div>
        <div class="side-btn"></div>
        <div class="side-btn"></div>
        <div class="side-btn"></div>
        <div class="side-btn"></div>
    </div>

    <div class="main-container">
        <header class="header">
            <div class="header-left">
                <div class="mini-bee">🐝</div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search goods...">
                </div>
            </div>

            <div class="header-center">
                <div class="brand-box">
                    <h1>🐝 Golden Apiary</h1>
                    <p class="subtitle">The best honey and bees straight from the beekeeper</p>
                </div>
            </div>

            <div class="header-right">
                <button class="catalog-btn">Catalog of goods</button>
            </div>
        </header>
    </div>

</body>
</html>
