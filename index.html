<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Apiary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.3">
</head>
<body>

    <header class="top-bar">
        <div class="top-bar-left">
            <div class="logo-box">
                <img src="https://em-content.zobj.net/source/apple/354/bee_1f41d.png" class="bee-img-small" alt="bee">
            </div>
            <div class="search-field">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search goods...">
            </div>
        </div>
        
        <div class="top-bar-center">
            <div class="title-with-bee">
                <img src="https://em-content.zobj.net/source/apple/354/bee_1f41d.png" class="bee-img-big" alt="bee">
                <h1 class="main-title">Golden Apiary</h1>
            </div>
            <p class="main-subtitle">The best honey and bees straight from the beekeeper</p>
        </div>

        <div class="top-bar-right">
            <a href="#" class="catalog-btn">Catalog of goods</a>
        </div>
    </header>

    <aside class="side-nav">
        <div class="nav-button active">
            <i class="fas fa-home"></i>
        </div>
        <div class="nav-button empty"></div>
        <div class="nav-button empty"></div>
        <div class="nav-button empty"></div>
        <div class="nav-button empty"></div>
        <div class="nav-button empty"></div>
        <div class="nav-button empty"></div>
        <div class="nav-button empty"></div>
    </aside>

</body>
</html>
