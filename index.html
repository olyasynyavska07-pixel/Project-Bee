<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Apiary — Офіційний сайт</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="bee-fly">🐝</div>
        <div class="loader-text">Golden Apiary...</div>
    </div>

    <header class="main-header">
        <div class="header-logo">
            <div class="logo-box">
                <i class="fas fa-bee logo-icon"></i>
            </div>
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search goods...">
            </div>
        </div>
        <div class="header-center">
            <div class="title-logo">
                <i class="fas fa-bee header-bee"></i>
                <h1 class="main-title">Golden Apiary</h1>
            </div>
            <p class="subtitle">The best honey and bees straight from the beekeeper</p>
        </div>
        <div class="header-right">
            <a href="#" class="catalog-btn">
                Catalog of goods
                <i class="fas fa-chevron-right catalog-arrow"></i>
            </a>
        </div>
    </header>

    <aside class="side-panel">
        <div class="panel-box home-box active">
            <i class="fas fa-home home-icon"></i>
        </div>
        <div class="panel-box empty-box"></div>
        <div class="panel-box empty-box"></div>
        <div class="panel-box empty-box"></div>
        <div class="panel-box empty-box"></div>
        <div class="panel-box empty-box"></div>
        <div class="panel-box empty-box"></div>
    </index-aside>

    <main class="content-area">
        <div class="container">
            <div class="main-placeholder">
                <p>Welcome to Golden Apiary!</p>
                <p>Here you can find and buy the best natural products from our honey factory.</p>
                <p>Feel the taste of real nature.</p>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 800);
        });
    </script>
</body>
</html>
