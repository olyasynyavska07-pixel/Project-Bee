<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { flex: 1; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: #d1d5db; padding: 15px; border-radius: 25px; width: 400px; }
        .auth-inner { background: #fef987; padding: 30px; border-radius: 20px; text-align: center; }
        .inp { background: #e5e7eb; border-radius: 20px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; }
        .inp input { border: none; background: transparent; outline: none; width: 100%; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="bg-layer"></div>
    <div class="main-layout">
        <div class="right-section">
            <header class="header">
                <div class="side-btn" style="margin:0">🐝</div>
                <div class="logo-box"><h1>Golden Apiary</h1></div>
                <button class="head-btn" onclick="location.href='index.html'">Back</button>
            </header>
            
            <div class="auth-container">
                <div class="auth-box">
                    <div class="auth-inner">
                        <h2 style="color: #a3a63c; margin-bottom: 20px;">Please Login</h2>
                        <div class="inp">👤<input type="text" placeholder="Login"></div>
                        <div class="inp">🔑<input type="password" placeholder="Password"></div>
                        <button class="head-btn" style="width: 100%; margin-top: 10px;">Sing</button>
                        <hr style="margin: 20px 0; border: 2px solid #d1d5db;">
                        <button class="head-btn" style="width: 100%;" onclick="location.href='register.html'">Register</button>
                    </div>
                </div>
            </div>

            <footer class="footer-line"><b>Golden Apiary © 2026</b></footer>
        </div>
    </div>
</body>
</html>
