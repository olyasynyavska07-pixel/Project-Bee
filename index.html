<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary - Structured</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loader">
        <div class="bee-fly">🐝</div>
        <p>ЗАВАНТАЖЕННЯ...</p>
    </div>

    <nav class="sidebar">
        <div class="side-btn" id="btn-home">🏠</div>
        <div class="side-btn">🍯</div>
        <div class="side-btn">🐝</div>
        <div class="side-btn">🛒</div>
    </nav>

    <div class="main-container">
        <header class="header">
            <div class="search-area">
                <span class="icon-group">🐝 Spoon</span>
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" placeholder="Search goods...">
                </div>
            </div>

            <div class="logo-box">
                <h1>Golden Apiary</h1>
                <p>The best honey and bees straight from the beekeeper</p>
            </div>

            <div class="btn-group">
                <button class="head-btn">Login</button>
                <button class="head-btn" id="btn-catalog">Catalog of goods</button>
            </div>
        </header>

        <main class="content">
            <div class="card"></div>
            <div class="card"></div>
            <div class="card"></div>
        </main>

        <div class="footer-line"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
