<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary - Final Fix</title>
    <style>
        /* ЗАБОРОНА ВИДІЛЕННЯ (крім інпутів) */
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        input {
            -webkit-user-select: text;
            user-select: text;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
        }

        /* ЕКРАН ЗАВАНТАЖЕННЯ */
        #loader-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fef08a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.6s ease;
        }

        .loader-bee {
            font-size: 60px;
            animation: fly 1.5s ease-in-out infinite;
        }

        @keyframes fly {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        /* БІЧНА ПАНЕЛЬ */
        .sidebar {
            width: 70px;
            height: 100vh;
            background-color: #6d744e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            position: fixed;
            left: 0; top: 0;
            z-index: 100;
        }

        .side-btn {
            width: 50px;
            height: 50px;
            background-color: #d9db72;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            pointer-events: auto; /* ГАРАНТІЯ КЛІКУ */
        }

        .wrapper {
            margin-left: 70px;
            width: calc(100% - 70px);
        }

        /* ШАПКА */
        .apiary-header {
            background-color: #fef08a;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .section { display: flex; align-items: center; flex: 1; }
        .section.left { justify-content: flex-start; gap: 15px; }
        .section.center { justify-content: center; }
        .section.right { justify-content: flex-end; }

        /* ПОШУК (Приспущений) */
        .search-box {
            background-color: #f3f4f6;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            width: 240px;
            margin-top: 35px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            margin-left: 10px;
        }

        .search-icon { cursor: pointer; pointer-events: auto; }

        /* ЛОГО */
        .brand-plate {
            background-color: #fef987;
            border: 6px solid #facc15;
            border-radius: 20px;
            padding: 15px 40px;
            text-align: center;
        }

        .brand-plate h1 { margin: 0; font-size: 42px; font-style: italic; color: #374151; }

        /* КАТАЛОГ (Зміщений вліво) */
        .catalog-btn {
            background-color: #d9db72;
            border: 2px solid #4b5563;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-style: italic;
            cursor: pointer;
            margin-right: 70px;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-bee">🐝</div>
        <div style="margin-top:20px; font-weight:bold; color:#6d744e;">ЗАВАНТАЖЕННЯ...</div>
    </div>

    <div class="sidebar">
        <div class="side-btn" id="btn-home">🏠</div>
        <div class="side-btn">🍯</div>
        <div class="side-btn">🐝</div>
    </div>

    <div class="wrapper">
        <header class="apiary-header">
            <div class="section left">
                <div style="background:#d9db72; padding:10px; border-radius:10px; font-size:22px;">🐝</div>
                <div class="search-box">
                    <span class="search-icon" id="btn-search">🔍</span>
                    <input type="text" id="searchInput" placeholder="Search goods...">
                </div>
            </div>

            <div class="section center">
                <div class="brand-plate">
                    <h1>Golden Apiary</h1>
                    <p style="margin:5px 0 0 0; font-style:italic;">The best honey from the beekeeper</p>
                </div>
            </div>

            <div class="section right">
                <button class="catalog-btn" id="btn-catalog">Catalog of goods</button>
            </div>
        </header>

        <main style="padding: 100px; text-align: center;">
            <h2 id="status-text">Ласкаво просимо!</h2>
            <p>Тепер усі кнопки знову працюють, а текст не виділяється.</p>
        </main>
    </div>

    <script>
        // 1. ПРИХОВУВАННЯ ЛОАДЕРА
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader-wrapper');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 600);
            }, 2000);
        });

        // 2. ЛОГІКА КНОПОК (через addEventListener - так надійніше)
        
        // Кнопка Додому (перезавантаження)
        document.getElementById('btn-home').addEventListener('click', () => {
            location.reload();
        });

        // Кнопка Каталог
        document.getElementById('btn-catalog').addEventListener('click', () => {
            document.getElementById('status-text').innerText = "Каталог активовано! 🍯";
            alert("Відкриваємо каталог товарів!");
        });

        // Пошук
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('btn-search');

        function runSearch() {
            const val = searchInput.value;
            if(val.trim()) {
                alert("Шукаємо: " + val);
            } else {
                alert("Введіть щось у пошук!");
            }
        }

        searchBtn.addEventListener('click', runSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') runSearch();
        });
    </script>
</body>
</html>
