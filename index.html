<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary - Fixed Layout</title>
    <style>
        /* ПОВНИЙ ГІДРОІЗОЛЯЦІЙНИЙ CSS - НІЧОГО НЕ ПОПЛИВЕ */
        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-user-select: none; user-select: none;
        }

        body, html {
            height: 100vh; width: 100vw;
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Забороняємо будь-яку прокрутку */
        }

        /* 1. ФОН, ЯКИЙ ЛЕЖИТЬ ПІД УСІМ */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; /* Найнижчий рівень */
            background-color: #2c3e50; /* Запасний колір */
            background-size: cover;
            background-position: center;
            animation: backgroundFade 15s infinite;
        }

        @keyframes backgroundFade {
            0%, 100% { background-image: url('pasika1.jpg'); background-color: #6d744e; }
            33% { background-image: url('pasika2.jpg'); background-color: #fde047; }
            66% { background-image: url('pasika3.jpg'); background-color: #a3a63c; }
        }

        /* 2. ГОЛОВНИЙ КОНТЕЙНЕР (ГОРТАНЬ) */
        .main-layout {
            display: flex; /* Ділимо на ліво і право */
            width: 100vw; height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* 3. САЙДБАР (ЗЛІВА) */
        .sidebar {
            width: 80px; height: 100%;
            background-color: rgba(109, 116, 78, 0.9); /* Оливка з прозорістю */
            display: flex; flex-direction: column; align-items: center;
            padding-top: 20px;
            flex-shrink: 0; /* Не даємо йому стискатися */
            border-right: 2px solid rgba(0,0,0,0.1);
        }

        .side-btn {
            width: 55px; height: 55px;
            background-color: #d9db72;
            margin-bottom: 15px; border-radius: 12px;
            display: flex; justify-content: center; align-items: center;
            font-size: 28px; cursor: pointer; transition: 0.3s;
        }
        .side-btn:hover { transform: scale(1.1); background-color: #e2e48b; }

        /* 4. ПРАВА ЧАСТИНА (ШАПКА + КОНТЕНТ) */
        .right-section {
            flex: 1; /* Займає весь залишок місця */
            display: flex;
            flex-direction: column;
            background-color: rgba(255, 255, 255, 0.2); /* Ефект скла */
        }

        /* ШАПКА */
        .header {
            background-color: #fef08a;
            height: 130px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px;
            border-bottom: 10px solid #fde047;
            flex-shrink: 0;
        }

        .search-container {
            display: flex; align-items: center;
            background-color: rgba(255,255,255,0.7);
            border-radius: 20px; padding: 8px 15px; width: 250px;
        }
        .search-container input { border: none; background: transparent; outline: none; width: 100%; margin-left: 8px; }

        .logo-box {
            background-color: #fef987;
            border: 5px solid #facc15;
            border-radius: 15px;
            padding: 10px 40px;
            text-align: center;
        }
        .logo-box h1 { font-size: 36px; font-style: italic; color: #374151; }

        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .head-btn {
            background-color: #d9db72;
            border: 2px solid #555;
            border-radius: 20px;
            padding: 8px 25px;
            font-weight: bold; cursor: pointer; width: 170px;
        }

        /* ТОВАРИ */
        .product-grid {
            flex: 1;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            overflow-y: auto; /* Якщо карток багато, можна скролити тільки їх */
        }

        .card {
            background-color: rgba(255, 255, 255, 0.9);
            border: 5px solid #d1d5db;
            border-radius: 25px;
            height: 250px;
            transition: 0.3s;
        }
        .card:hover { border-color: #facc15; transform: translateY(-5px); }

        .footer-line {
            height: 15px; width: 100%;
            background-color: #fde047;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-layout">
        
        <nav class="sidebar">
            <div class="side-btn">🏠</div>
            <div class="side-btn">🍯</div>
            <div class="side-btn">🐝</div>
            <div class="side-btn">🛒</div>
        </nav>

        <div class="right-section">
            <header class="header">
                <div class="search-container">
                    <span>🔍</span>
                    <input type="text" placeholder="Search goods...">
                </div>

                <div class="logo-box">
                    <h1>Golden Apiary</h1>
                    <p>The best honey and bees straight from the beekeeper</p>
                </div>

                <div class="btn-group">
                    <button class="head-btn" onclick="alert('Login!')">Login</button>
                    <button class="head-btn" onclick="alert('Catalog!')">Catalog of goods</button>
                </div>
            </header>

            <main class="product-grid">
                <div class="card"></div>
                <div class="card"></div>
                <div class="card"></div>
            </main>

            <footer class="footer-line"></footer>
        </div>

    </div>

</body>
</html>
