<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Golden Apiary - Flying Loader</title>
    <style>
        /* 1. СТИЛІ ЗАВАНТАЖУВАЧА - ПЕРЕПИСАНІ ДЛЯ ПОЛЬОТУ */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #fef08a; /* Колір шапки */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Поверх усього */
            transition: opacity 0.6s ease;
        }

        .loader-bee {
            font-size: 60px;
            /* АНІМАЦІЯ ПОЛЬОТУ: триває 1.5 секунди, плавна (ease-in-out), безкінечна */
            animation: flyUpDown 1.5s ease-in-out infinite;
        }

        .loader-text {
            margin-top: 30px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            color: #6d744e;
            letter-spacing: 2px;
            font-size: 18px;
        }

        /* КЛЮЧОВІ КАДРИ ДЛЯ ПОЛЬОТУ ВГОРУ І ВНИЗ */
        @keyframes flyUpDown {
            0% { 
                transform: translateY(0px); /* Початкова позиція */
            }
            50% { 
                transform: translateY(-25px); /* Зліт вгору на 25 пікселів */
            }
            100% { 
                transform: translateY(0px); /* Повернення вниз */
            }
        }

        /* 2. ОСНОВНІ СТИЛІ САЙТУ (твоя ідеальна версія "по чіназику") */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            font-family: 'Arial', sans-serif;
            background-color: #ffffff;
            overflow-x: hidden;
        }

        /* Бічна панель */
        .sidebar {
            width: 70px;
            height: 100vh;
            background-color: #6d744e;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 15px;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 100;
        }

        .side-btn {
            width: 50px;
            height: 50px;
            background-color: #d9db72;
            margin-bottom: 12px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.3s;
        }

        .side-btn:hover { background-color: #e2e48b; transform: scale(1.1); }

        /* Контейнер */
        .wrapper {
            margin-left: 70px;
            width: calc(100% - 70px);
        }

        /* Шапка */
        .apiary-header {
            background-color: #fef08a;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-sizing: border-box;
        }

        .section { display: flex; align-items: center; flex: 1; }
        .section.left { justify-content: flex-start; gap: 15px; }
        .section.center { justify-content: center; }
        .section.right { justify-content: flex-end; }

        /* Пошук */
        .search-box {
            background-color: #f3f4f6;
            border-radius: 25px;
            display: flex;
            align-items: center;
            padding: 10px 20px;
            width: 240px;
            margin-top: 35px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            margin-left: 10px;
        }

        /* Лого */
        .brand-plate {
            background-color: #fef987;
            border: 6px solid #facc15;
            border-radius: 20px;
            padding: 15px 40px;
            text-align: center;
        }

        .brand-plate h1 { margin: 0; font-size: 42px; font-style: italic; color: #374151; }

        /* Кнопка каталогу */
        .catalog-btn {
            background-color: #d9db72;
            border: 2px solid #4b5563;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 700;
            font-style: italic;
            cursor: pointer;
            margin-right: 70px;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <div class="loader-bee">🐝</div>
        <div class="loader-text">ГОТУЄМО МЕДОК...</div>
    </div>

    <div class="sidebar">
        <div class="side-btn" onclick="location.reload()">🏠</div>
        <div class="side-btn">🍯</div>
        <div class="side-btn">🐝</div>
    </div>

    <div class="wrapper">
        <header class="apiary-header">
            <div class="section left">
                <div style="background:#d9db72; padding:10px; border-radius:10px; font-size:22px;">🐝</div>
                <div class="search-box">
                    <span>🔍</span>
                    <input type="text" placeholder="Search goods...">
                </div>
            </div>

            <div class="section center">
                <div class="brand-plate">
                    <h1>Golden Apiary</h1>
                    <p style="margin:5px 0 0 0; font-style:italic;">The best honey straight from the beekeeper</p>
                </div>
            </div>

            <div class="section right">
                <button class="catalog-btn">Catalog of goods</button>
            </div>
        </header>

        <main style="padding: 100px; text-align: center;">
            <h2>Ласкаво просимо! Сторінка завантажена успішно.</h2>
            <p>Тепер бджілка на екрані завантаження літає вгору та вниз.</p>
        </main>
    </div>

    <script>
        // ЛОГІКА ЗАВАНТАЖЕННЯ (приховування екрана)
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader-wrapper');
            
            // Робимо затримку 2 секунди, щоб встигнути побачити польот
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                }, 600); // Час на плавне зникнення
            }, 2000); 
        });
    </script>

</body>
</html>
