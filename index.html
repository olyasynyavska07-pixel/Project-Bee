<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="main-layout">
        <nav class="sidebar">
            <div class="side-btn">🏠</div>
            <div class="side-btn">🍯🥄</div>
            <div class="side-btn">🐝</div>
            <div class="side-btn">🛒</div>
        </nav>
        <div class="right-section">
            <header class="header">
                <div style="font-size: 20px;">🐝 Spoon</div>
                <div class="logo-box">
                    <h1>Golden Apiary</h1>
                    <p>The best honey and bees straight from the beekeeper</p>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <button class="head-btn" onclick="location.href='login.html'">Login</button>
                    <button class="head-btn" style="font-size: 12px;">Catalog of goods</button>
                </div>
            </header>
            <main style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; padding: 40px;">
                <div style="background: white; border: 4px solid #d1d5db; border-radius: 20px; height: 250px;"></div>
                <div style="background: white; border: 4px solid #3b82f6; border-radius: 20px; height: 250px;"></div>
                <div style="background: white; border: 4px solid #d1d5db; border-radius: 20px; height: 250px;"></div>
            </main>
            <div class="footer-line"></div>
        </div>
    </div>
</body>
</html>
