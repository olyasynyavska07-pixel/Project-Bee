<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Apiary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* УСІ СТИЛІ В ОДНОМУ ФАЙЛІ ДЛЯ НАДІЙНОСТІ */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #ffffff;
        }

        /* ЖОВТА ШАПКА */
        .header {
            background-color: #fdf6bb; 
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #ddd;
        }

        /* ПОШУК */
        .search-box {
            display: flex;
            align-items: center;
            background-color: #e6e6e6;
            padding: 8px 15px;
            border-radius: 10px;
            width: 250px;
        }
        .search-box input {
            border: none;
            background: transparent;
            margin-left: 10px;
            outline: none;
            width: 100%;
        }

        /* ЦЕНТРАЛЬНИЙ БЛОК (ЛОГО) */
        .logo-container {
            background-color: #fffbdf;
            border: 8px solid #ffd700; /* Подвійна рамка як на макеті */
            border-radius: 15px;
            padding: 5px 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-align: center;
        }
        .logo-text h1 {
            margin: 0;
            font-size: 28px;
            font-style: italic;
            color: #333;
        }
        .logo-text p {
            margin: 0;
            font-size: 10px;
            color: #666;
        }

        /* КНОПКА КАТАЛОГУ */
        .catalog-btn {
            background-color: #d8e17b;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
        }

        /* ОСНОВНА ЧАСТИНА */
        .main-wrapper {
            display: flex;
            flex: 1;
        }

        /* ЗЕЛЕНЕ МЕНЮ ЗЛІВА */
        .sidebar {
            background-color: #6b7554; /* Оливковий фон */
            width: 70px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            gap: 15px;
        }

        /* ЖОВТІ КВАДРАТИ МЕНЮ */
        .nav-link {
            width: 45px;
            height: 45px;
            background-color: #d8e17b;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            text-decoration: none;
            font-size: 18px;
            transition: 0.3s;
        }
        .nav-link:hover {
            background-color: #fff;
        }
        .nav-link.active {
            background-color: #fdf6bb;
        }

        /* КОНТЕНТ */
        .content {
            flex: 1;
            padding: 30px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search goods...">
        </div>

        <div class="logo-container">
            <span style="font-size: 30px;">🐝</span>
            <div class="logo-text">
                <h1>Golden Apiary</h1>
                <p>The best honey and bees straight from the beekeeper</p>
            </div>
        </div>

        <button class="catalog-btn">Catalog of goods</button>
    </div>

    <div class="main-wrapper">
        <div class="sidebar">
            <a href="#" class="nav-link active"><i class="fas fa-home"></i></a>
            <a href="#" class="nav-link"><i class="fas fa-seedling"></i></a>
            <a href="#" class="nav-link"><i class="fas fa-jar"></i></a>
            <a href="#" class="nav-link"><i class="fas fa-bug"></i></a>
            <a href="#" class="nav-link"><i class="fas fa-info-circle"></i></a>
            <a href="#" class="nav-link"><i class="fas fa-images"></i></a>
            <a href="#" class="nav-link"><i class="fas fa-envelope"></i></a>
        </div>

        <div class="content">
            <h2>Вітаємо на нашій пасіці!</h2>
            <p>Це головна сторінка. Виберіть розділ у меню зліва, щоб дізнатися більше.</p>
        </div>
    </div>

</body>
</html>
