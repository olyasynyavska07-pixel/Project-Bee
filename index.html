<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Apiary</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="top-bar-left">
            <div class="logo-box">
                <i class="fas fa-bee logo-icon"></i>
            </div>
            <div class="search-field">
                <i class="fas fa-search search-icon"></i>
                <input type="text" placeholder="Search goods...">
            </div>
        </div>
        
        <div class="top-bar-center">
            <div class="title-with-bee">
                <i class="fas fa-bee title-bee"></i>
                <h1 class="main-title">Golden Apiary</h1>
            </div>
            <p class="main-subtitle">The best honey and bees straight from the beekeeper</p>
        </div>

        <div class="top-bar-right">
            <a href="#" class="catalog-btn">Catalog of goods</a>
        </div>
    </header>

</body>
</html>
